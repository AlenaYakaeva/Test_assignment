services:
  db:
    image: postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgresql_pass
      POSTGRES_DB: example_app
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d example_app"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - EXAMPLER_SERVICE_DB_DSN=postgres://postgres:postgresql_pass@db:5432/example_app?sslmode=disable
    volumes:
      - ./migration:/root/migration
      - ./config.env:/root/config.env
    depends_on:
      db:
        condition: service_healthy